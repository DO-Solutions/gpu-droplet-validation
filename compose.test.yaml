# Mock validation stack shared by --gpu-model test-pass / test-fail /
# test-error. Services run serially via depends_on and share a results bind
# mount. Scenario dispatch is driven by $SCENARIO (derived in run.sh from
# --gpu-model) so callers never need to encode the scenario into --run-id.
#
# Image tags resolve from $VERSION (set by run.sh from the tarball's VERSION
# file). Falls back to :latest when extracted without a VERSION file — useful
# for local dev.
#
# The host-side results path comes from $RESULTS_DIR (exported by run.sh,
# defaults to ./results for bare `docker compose up` invocations). Containers
# always see it mounted at /results internally.

services:
  prereqs:
    image: ghcr.io/do-solutions/gpu-droplet-validation/prereqs-test:${VERSION:-latest}
    container_name: dv-prereqs
    environment:
      RUN_ID: ${RUN_ID:-}
      SCENARIO: ${SCENARIO:-}
    volumes:
      - ${RESULTS_DIR:-./results}:/results

  setup:
    image: ghcr.io/do-solutions/gpu-droplet-validation/setup-test:${VERSION:-latest}
    container_name: dv-setup
    environment:
      RUN_ID: ${RUN_ID:-}
      SCENARIO: ${SCENARIO:-}
    volumes:
      - ${RESULTS_DIR:-./results}:/results
    depends_on:
      prereqs:
        condition: service_completed_successfully

  mock-test:
    image: ghcr.io/do-solutions/gpu-droplet-validation/mock-test:${VERSION:-latest}
    container_name: dv-mock-test
    environment:
      RUN_ID: ${RUN_ID:-}
      SCENARIO: ${SCENARIO:-}
    volumes:
      - ${RESULTS_DIR:-./results}:/results
    depends_on:
      setup:
        condition: service_completed_successfully

  teardown:
    image: ghcr.io/do-solutions/gpu-droplet-validation/teardown-test:${VERSION:-latest}
    container_name: dv-teardown
    environment:
      RUN_ID: ${RUN_ID:-}
      SCENARIO: ${SCENARIO:-}
    volumes:
      - ${RESULTS_DIR:-./results}:/results
    # mock-test exits 0 in both pass and fail scenarios (failure is carried in
    # the JSON result, not the exit code), so service_completed_successfully
    # is the right condition here. If a future real test container starts
    # using exit code to signal failure, this will need revisiting.
    depends_on:
      mock-test:
        condition: service_completed_successfully

  tap-reporter:
    image: ghcr.io/do-solutions/gpu-droplet-validation/tap-reporter:${VERSION:-latest}
    container_name: dv-tap-reporter
    environment:
      RUN_ID: ${RUN_ID:-}
      SCENARIO: ${SCENARIO:-}
    volumes:
      - ${RESULTS_DIR:-./results}:/results
    depends_on:
      teardown:
        condition: service_completed_successfully
