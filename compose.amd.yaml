# Stub compose for --gpu-model amd. The real suite is not yet implemented;
# this runs a single container that prints "not implemented" and exits 1 so
# callers get a clean failure.

services:
  stub:
    image: ghcr.io/do-solutions/droplet-validation/amd-stub:${VERSION:-latest}
    container_name: dv-amd-stub
    environment:
      RUN_ID: ${RUN_ID:-}
